name: Update Profile README

on:
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      # Update YouTube videos
      - name: Fetch YouTube Videos
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=YOUR_CHANNEL_ID"
          max_post_count: 5
          template: "- 🎥 [$title]($url)"
          comment_tag_name: "YOUTUBE-VIDEOS"

      # Set up Python for Twitter
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'
      - name: Install tweepy
        run: pip install tweepy
      - name: Update Twitter Feed
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python .github/scripts/update_tweets.py
